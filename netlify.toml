[build]
  command   = "npm run build"
  publish   = "dist"

[functions]
  directory    = "netlify/functions"
  node_bundler = "esbuild"

# Clean API URL rewrites
[[redirects]]
  from   = "/api/v1/leads"
  to     = "/.netlify/functions/forge-leads"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/v1/health"
  to     = "/.netlify/functions/forge-health"
  status = 200
  force  = true

# Gumroad purchase webhook → n8n
[[redirects]]
  from   = "/api/v1/gumroad-webhook"
  to     = "/.netlify/functions/gumroad-webhook"
  status = 200
  force  = true

# Stripe billing
[[redirects]]
  from   = "/api/v1/billing/checkout"
  to     = "/.netlify/functions/stripe-checkout"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/v1/billing/webhook"
  to     = "/.netlify/functions/stripe-webhook"
  status = 200
  force  = true

# Legacy product short-URLs → React routes
[[redirects]]
  from   = "/leadcore"
  to     = "/products/leadcore"
  status = 301
  force  = true

[[redirects]]
  from   = "/inboxcore"
  to     = "/products/inboxcore"
  status = 301
  force  = true

[[redirects]]
  from   = "/contentcore"
  to     = "/products/contentcore"
  status = 301
  force  = true

[[redirects]]
  from   = "/postcore"
  to     = "/products/postcore"
  status = 301
  force  = true

[[redirects]]
  from   = "/reportcore"
  to     = "/products/reportcore"
  status = 301
  force  = true

[[redirects]]
  from   = "/knowcore"
  to     = "/products/knowcore"
  status = 301
  force  = true

[[redirects]]
  from   = "/meetcore"
  to     = "/products/meetcore"
  status = 301
  force  = true

[[redirects]]
  from   = "/schedcore"
  to     = "/products/schedcore"
  status = 301
  force  = true

# SPA fallback — keep last
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
